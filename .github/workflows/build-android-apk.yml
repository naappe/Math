name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Verify Android project
        run: |
          test -f android-app/settings.gradle.kts
          test -f android-app/build.gradle.kts
          test -f android-app/app/build.gradle.kts
          gradle --version

      - name: Build debug APK
        run: gradle --no-daemon -p android-app clean assembleDebug --stacktrace

      - name: Copy APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk MathRecorder-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MathRecorder-APK
          path: MathRecorder-debug.apk
          if-no-files-found: error
          retention-days: 30
