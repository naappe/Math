name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle -p android-app assembleDebug --stacktrace

      - name: Rename APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk MathRecorder-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MathRecorder-APK
          path: MathRecorder-debug.apk
          if-no-files-found: error
          retention-days: 30
