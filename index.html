<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Desktop Viewer</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    main {
      width: min(1100px, 94vw);
      text-align: center;
    }

    video {
      width: 100%;
      margin-top: 20px;
      background: black;
      border: 1px solid #555;
      border-radius: 12px;
    }

    button {
      padding: 14px 22px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main>
    <h1>Desktop Viewer</h1>

    <button id="shareButton">Show My Desktop</button>

    <video id="desktopVideo" autoplay muted playsinline></video>
  </main>

  <script>
    const shareButton = document.getElementById("shareButton");
    const desktopVideo = document.getElementById("desktopVideo");

    shareButton.addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: true,
          audio: false
        });

        desktopVideo.srcObject = stream;

        const videoTrack = stream.getVideoTracks()[0];

        videoTrack.addEventListener("ended", () => {
          desktopVideo.srcObject = null;
        });
      } catch (error) {
        console.error(error);
        alert("Desktop sharing was cancelled or blocked.");
      }
    });
  </script>
</body>
</html>
